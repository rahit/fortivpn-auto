# fortivpn-auto preset — University of Calgary "General" SSL-VPN
#
#     cp presets/ucalgary.conf vpn.conf && ./install.sh
#
# Authenticate with your UCalgary IT account (SAML SSO + Microsoft Authenticator
# MFA). The cert is pinned live at install; UCalgary's EV cert renews yearly —
# run ./refresh-cert.sh when a connect fails with a cert-validation error.

GATEWAY_HOST="generalconnect.ucalgary.ca"
GATEWAY_PORT="10443"

# On-campus secure Wi-Fi — no VPN needed there.
TRUSTED_SSIDS=("airuc-secure")

TRUSTED_CERT=""        # fetch live at install
OPENFORTIVPN_BIN=""    # auto-detect
REALM=""
